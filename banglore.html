<html>
    <head>
        <style>
            /* ===== Indiranagar Store styles (unique: in-*) ===== */
.in-section{
  max-width:1200px; margin:40px auto; padding:24px 16px; background:#fff;
}
.in-title{
  text-align:center; font-size:clamp(22px,3.2vw,34px);
  font-weight:800; margin-bottom:18px; color:#1b1b1b;
}
.in-gallery{
  display:grid; gap:14px;
  grid-template-columns:repeat(4,1fr);
}
.in-imgwrap{
  aspect-ratio:4/3; overflow:hidden; border-radius:16px;
  background:#f3f3f3; margin:0; box-shadow:0 6px 18px rgba(0,0,0,.08);
}
.in-imgwrap img{
  width:100%; height:100%; object-fit:cover; transition:transform .35s ease;
  display:block;
}
.in-imgwrap:hover img{ transform:scale(1.04); }

.in-meta{
  margin-top:16px; text-align:center; color:#2b2b2b;
}
.in-line{ margin:6px 0; font-size:clamp(14px,1.8vw,16px); }
.in-label{ font-weight:700; }
.in-link{ color:#1d6ae5; text-decoration:none; }
.in-link:hover{ text-decoration:underline; }
.in-sep{ margin:0 8px; opacity:.5; }

.in-cta{
  margin-top:18px; display:flex; justify-content:center;
}
.in-btn{
  display:inline-block; padding:14px 26px; border-radius:999px;
  background:#2fb37a; color:#fff; font-weight:800; letter-spacing:.3px;
  text-decoration:none; box-shadow:0 8px 20px rgba(47,179,122,.3);
  transition:transform .12s ease, box-shadow .12s ease, opacity .12s ease;
}
.in-btn:hover{ transform:translateY(-1px); box-shadow:0 10px 24px rgba(47,179,122,.35); }
.in-btn:active{ transform:translateY(0); opacity:.9; }

/* Responsive */
@media (max-width:1024px){
  .in-gallery{ grid-template-columns:repeat(3,1fr); }
}
@media (max-width:720px){
  .in-gallery{ grid-template-columns:repeat(2,1fr); }
}
@media (max-width:460px){
  .in-gallery{ grid-template-columns:1fr; }
  .in-btn{ width:100%; text-align:center; }
}
/* ===== /Indiranagar Store styles ===== */

</style>
</head>

<body>

<!-- ===== Indiranagar Store Section (unique: in-*) ===== -->
<section class="in-section" id="indiranagar-store">
  <h2 class="in-title">Indiranagar Store</h2>

  <div class="in-gallery">
    <figure class="in-imgwrap">
      <img src="IMG/p46.avif" alt="Indiranagar Store Reception">
    </figure>
    <figure class="in-imgwrap">
      <img src="IMG/p47.webp" alt="Indiranagar Store Interior Plants">
    </figure>
    <figure class="in-imgwrap">
      <img src="IMG/p48.avif" alt="Indiranagar Store Shelves">
    </figure>
    <figure class="in-imgwrap">
      <img src="IMG/p49.webp" alt="Indiranagar Store Aisle">
    </figure>
  </div>

  <div class="in-meta">
    <p class="in-line">
      <span class="in-label">Address:</span>
      No. 1214, 100 Feet Rd, HAL 2nd Stage, Doopanahalli, Indiranagar, Bengaluru, Karnataka 560008
    </p>
    <p class="in-line">
      <span class="in-label">Contact:</span>
      <a class="in-link" href="tel:‪+919096155771‬">‪+91 90961 55771‬</a>
      <span class="in-sep">|</span>
      <span class="in-label">Hours:</span> 10:00 AM – 10:00 PM
    </p>
  </div>

  <div class="in-cta">
    <a class="in-btn" target="_blank" rel="noopener"
       href="https://www.google.com/maps/search/?api=1&query=No.+1214,+100+Feet+Rd,+HAL+2nd+Stage,+Doopanahalli,+Indiranagar,+Bengaluru,+Karnataka+560008">
      Get Directions
    </a>
  </div>
</section>
<!-- ===== /Indiranagar Store Section ===== -->
