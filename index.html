<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Pritha 📖✨</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: 'Georgia', serif;
    background: black;
}

/* Stars */
.star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    animation: move 10s linear infinite;
}

@keyframes move {
    from {transform: translateY(0);}
    to {transform: translateY(100vh);}
}

/* Card */
.card {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    padding: 30px;
    width: 340px;
    border-radius: 20px;
    text-align: center;
    color: white;
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}

.title {
    font-size: 22px;
    margin-bottom: 15px;
}

.subtitle {
    font-size: 14px;
    color: #ddd;
    margin-bottom: 15px;
}

.text {
    min-height: 120px;
    font-size: 18px;
}

button {
    margin-top: 20px;
    padding: 10px 18px;
    border: none;
    border-radius: 20px;
    background: #ff7eb3;
    color: white;
    cursor: pointer;
}

/* Emojis */
.emoji {
    position: absolute;
    font-size: 20px;
    animation: float 6s linear infinite;
}

@keyframes float {
    0% {transform: translateY(100vh);}
    100% {transform: translateY(-10vh);}
}

/* Burst */
.burst {
    position: absolute;
    width: 6px;
    height: 6px;
    background: white;
    border-radius: 50%;
    animation: explode 1s forwards;
}

@keyframes explode {
    to {
        transform: translate(var(--x), var(--y));
        opacity: 0;
    }
}
</style>
</head>

<body>

<div class="card">
    <div class="title">🌌 Pritha’s Reading Space 📖✨</div>
    <div class="subtitle">A tiny universe for a reader 🌙</div>
    <div class="text" id="text">Hey Pritha 🙂 Tap below to begin...</div>
    <button onclick="next()">Next ➡️</button>
</div>

<script>

/* Stars */
for(let i=0;i<80;i++){
    let s = document.createElement("div");
    s.className = "star";
    s.style.left = Math.random()*100 + "vw";
    s.style.top = Math.random()*100 + "vh";
    s.style.animationDuration = (5 + Math.random()*5) + "s";
    document.body.appendChild(s);
}

/* Emojis */
let emojis = ["📖","✨","💫","🌙","📚"];
for(let k=0;k<15;k++){
    let e = document.createElement("div");
    e.className = "emoji";
    e.innerHTML = emojis[Math.floor(Math.random()*emojis.length)];
    e.style.left = Math.random()*100 + "vw";
    e.style.animationDuration = (4 + Math.random()*4) + "s";
    document.body.appendChild(e);
}

/* Quotes */
let quotes = [
"📚 'Books are a uniquely portable magic.' ✨",
"🌙 'Reading is dreaming with open eyes.' 💭",
"💫 'A reader lives many lives in one.'",
"🌸 'Some stories stay forever...' 📖",
"📖 'Every page you read adds a new world inside you.'",
"😄 Just thought of making something small for you... hope you like it 🙂"
];

let i = 0;

/* Typing */
function typeEffect(text, element) {
    element.innerHTML = "";
    let j = 0;
    function type() {
        if (j < text.length) {
            element.innerHTML += text.charAt(j);
            j++;
            setTimeout(type, 25);
        }
    }
    type();
}

/* Burst */
function burstEffect() {
    for(let b=0;b<15;b++){
        let dot = document.createElement("div");
        dot.className = "burst";
        dot.style.left = "50%";
        dot.style.top = "50%";
        dot.style.setProperty('--x', (Math.random()*200-100)+"px");
        dot.style.setProperty('--y', (Math.random()*200-100)+"px");
        document.body.appendChild(dot);
        setTimeout(()=>dot.remove(),1000);
    }
}

/* Next */
function next(){
    burstEffect();
    if(i < quotes.length){
        typeEffect(quotes[i], document.getElementById("text"));
        i++;
    } else {
        typeEffect("🌌 The End... or maybe just another chapter 😉📖", document.getElementById("text"));
    }
}

</script>

</body>
</html>
