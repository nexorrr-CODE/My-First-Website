<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Cart System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, rgb(100, 199, 113) 100%, rgb(58, 190, 76) 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .products-grid {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 70vh;
            margin-bottom: 30px;
        }

        .product-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
            max-width: 450px;
            width: 100%;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        .product-image {
            width: 100%;
            height: 350px;
            object-fit: cover;
            border-radius: 15px;
            margin-bottom: 25px;
        }

        .product-name {
            font-size: 1.8em;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
            text-align: center;
        }

        .product-price {
            font-size: 1.5em;
            color:black;
            font-weight: bold;
            text-align: center;
        }

        .cart-button {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #79d16e;
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 50px;
            font-size: 1.1em;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            z-index: 1000;
            transition: all 0.3s;
        }

        .cart-button:hover {
            background: #194b01;
            transform: scale(1.05);
        }

        .cart-count {
            background: white;
            color: #ff6b6b;
            border-radius: 50%;
            padding: 2px 8px;
            margin-left: 10px;
            font-weight: bold;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 800px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #ff6b6b;
            color: white;
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2em;
            transition: all 0.3s;
        }

        .close-btn:hover {
            background: #ff5252;
            transform: rotate(90deg);
        }

        .product-detail {
            display: flex;
            gap: 30px;
            margin-bottom: 20px;
        }

        .product-detail-image {
            width: 300px;
            height: 300px;
            object-fit: cover;
            border-radius: 15px;
        }

        .product-info {
            flex: 1;
        }

        .product-title {
            font-size: 2em;
            margin-bottom: 15px;
            color: #333;
        }

        .price-section {
            margin-bottom: 15px;
        }

        .old-price {
            text-decoration: line-through;
            color: #999;
            font-size: 1.2em;
            margin-right: 10px;
        }

        .new-price {
            color: #667eea;
            font-size: 1.8em;
            font-weight: bold;
        }

        .rating {
            margin-bottom: 20px;
            font-size: 1.5em;
            color: #ffc107;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
        }

        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .btn-buy {
            background: orange;
            color: white;
            flex: 1;
        }

        .btn-buy:hover {
            background:orangered;
        }

        .btn-cart {
            background: #51cf66;
            color: white;
            flex: 1;
        }

        .btn-cart:hover {
            background: #0aa827;
        }

        .payment-options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .payment-option {
            padding: 20px;
            border: 2px solid #ddd;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            font-weight: bold;
        }

        .payment-option:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .payment-option.selected {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .success-animation {
            text-align: center;
            padding: 40px;
        }

        .checkmark {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            display: block;
            stroke-width: 3;
            stroke: #51cf66;
            stroke-miterlimit: 10;
            margin: 20px auto;
            animation: fill 0.4s ease-in-out 0.4s forwards, scale 0.3s ease-in-out 0.9s both;
        }

        .checkmark-circle {
            stroke-dasharray: 166;
            stroke-dashoffset: 166;
            stroke-width: 3;
            stroke-miterlimit: 10;
            stroke: #51cf66;
            fill: none;
            animation: stroke 0.6s cubic-bezier(0.65, 0, 0.45, 1) forwards;
        }

        .checkmark-check {
            transform-origin: 50% 50%;
            stroke-dasharray: 48;
            stroke-dashoffset: 48;
            animation: stroke 0.3s cubic-bezier(0.65, 0, 0.45, 1) 0.8s forwards;
        }

        @keyframes stroke {
            100% {
                stroke-dashoffset: 0;
            }
        }

        @keyframes scale {
            0%, 100% {
                transform: none;
            }
            50% {
                transform: scale3d(1.1, 1.1, 1);
            }
        }

        @keyframes fill {
            100% {
                box-shadow: inset 0px 0px 0px 30px #51cf66;
            }
        }

        .success-message {
            font-size: 2em;
            color: #51cf66;
            font-weight: bold;
            margin: 20px 0;
        }

        .delivery-info {
            font-size: 1.2em;
            color: #666;
            margin-top: 15px;
        }

        .cart-items {
            margin-top: 20px;
        }

        .cart-item {
            display: flex;
            gap: 15px;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .cart-item-image {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
        }

        .cart-item-info {
            flex: 1;
        }

        .remove-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
        }

        .remove-btn:hover {
            background: #ff5252;
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        @media (max-width: 768px) {
            .product-detail {
                flex-direction: column;
            }

            .product-detail-image {
                width: 100%;
            }

            .payment-options {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌿 Bring Nature Home</h1>
        
        <button class="cart-button" onclick="openCart()">
            🛒 Cart <span class="cart-count" id="cartCount">0</span>
        </button>

        <div class="products-grid" id="productsGrid"></div>
    </div>

    <!-- Product Detail Modal -->
    <div class="modal" id="productModal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal('productModal')">✕</button>
            <div class="product-detail" id="productDetail"></div>
        </div>
    </div>

    <!-- Cart Modal -->
    <div class="modal" id="cartModal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal('cartModal')">✕</button>
            <h2>Your Cart</h2>
            <div class="cart-items" id="cartItems"></div>
            <button class="btn btn-buy" onclick="proceedToPayment()" style="width: 100%; margin-top: 20px;">
                Proceed to Checkout
            </button>
        </div>
    </div>

    <!-- Payment Modal -->
    <div class="modal" id="paymentModal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal('paymentModal')">✕</button>
            <h2>Select Payment Method</h2>
            <div class="payment-options">
                <div class="payment-option" onclick="selectPayment('credit')">
                    💳 Credit Card
                </div>
                <div class="payment-option" onclick="selectPayment('debit')">
                    💳 Debit Card
                </div>
                <div class="payment-option" onclick="selectPayment('upi')">
                    📱 UPI
                </div>
                <div class="payment-option" onclick="selectPayment('cod')">
                    💵 Cash on Delivery
                </div>
            </div>
            <button class="btn btn-buy" onclick="proceedToAddress()" style="width: 100%; margin-top: 30px;">
                Continue
            </button>
        </div>
    </div>

    <!-- Address Modal -->
    <div class="modal" id="addressModal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal('addressModal')">✕</button>
            <h2>Delivery Address</h2>
            <form id="addressForm">
                <div class="form-group">
                    <label>Full Name *</label>
                    <input type="text" required placeholder="Enter your full name">
                </div>
                <div class="form-group">
                    <label>Village/Area Name *</label>
                    <input type="text" required placeholder="Enter village or area name">
                </div>
                <div class="form-group">
                    <label>City *</label>
                    <input type="text" required placeholder="Enter city name">
                </div>
                <div class="form-group">
                    <label>District *</label>
                    <input type="text" required placeholder="Enter district name">
                </div>
                <div class="form-group">
                    <label>PIN Code *</label>
                    <input type="text" required placeholder="Enter PIN code" pattern="[0-9]{6}">
                </div>
                <div class="form-group">
                    <label>Phone Number *</label>
                    <input type="tel" required placeholder="Enter phone number" pattern="[0-9]{10}">
                </div>
                <button type="submit" class="btn btn-buy" style="width: 100%;">
                    Place Order
                </button>
            </form>
        </div>
    </div>

    <!-- Success Modal -->
    <div class="modal" id="successModal">
        <div class="modal-content">
            <div class="success-animation">
                <svg class="checkmark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52">
                    <circle class="checkmark-circle" cx="26" cy="26" r="25" fill="none"/>
                    <path class="checkmark-check" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
                </svg>
                <div class="success-message">🎉 Congratulations!</div>
                <p style="font-size: 1.3em; margin: 15px 0;">Your order has been placed successfully!</p>
                <div class="delivery-info" id="deliveryInfo"></div>
                <button class="btn btn-buy" onclick="closeAllModals()" style="margin-top: 30px;">
                    Continue Shopping
                </button>
            </div>
        </div>
    </div>

    <script>
        // Sample product data
        const products = [
            {
                id: 1,
                name: "Ridged Wooden Pot",
                image: "IMG/p26.webp",
                oldPrice: 1499,
                newPrice: 1999,
                rating: 5.6
            }
        ];

        let cart = [];
        let selectedPayment = '';
        let currentProduct = null;

        // Initialize products
        function initProducts() {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = products.map(product => `
                <div class="product-card" onclick="openProductDetail(${product.id})">
                    <img src="${product.image}" alt="${product.name}" class="product-image">
                    <div class="product-name">${product.name}</div>
                    <div class="product-price">₹${product.newPrice}</div>
                </div>
            `).join('');
        }

        function openProductDetail(id) {
            currentProduct = products.find(p => p.id === id);
            const detail = document.getElementById('productDetail');
            detail.innerHTML = `
                <img src="${currentProduct.image}" alt="${currentProduct.name}" class="product-detail-image">
                <div class="product-info">
                    <h2 class="product-title">${currentProduct.name}</h2>
                    <div class="price-section">
                        <span class="old-price">₹${currentProduct.oldPrice}</span>
                        <span class="new-price">₹${currentProduct.newPrice}</span>
                    </div>
                    <div class="rating">
                        ${'⭐'.repeat(Math.floor(currentProduct.rating))} ${currentProduct.rating}/5
                    </div>
                    <div class="action-buttons">
                        <button class="btn btn-buy" onclick="buyNow()">Buy Now</button>
                        <button class="btn btn-cart" onclick="addToCart()">Add to Cart</button>
                    </div>
                </div>
            `;
            openModal('productModal');
        }

        function addToCart() {
            if (!cart.find(item => item.id === currentProduct.id)) {
                cart.push(currentProduct);
                updateCartCount();
                alert('✅ Added to cart!');
            } else {
                alert('ℹ️ Item already in cart!');
            }
        }

        function buyNow() {
            if (!cart.find(item => item.id === currentProduct.id)) {
                cart.push(currentProduct);
                updateCartCount();
            }
            closeModal('productModal');
            openModal('paymentModal');
        }

        function updateCartCount() {
            document.getElementById('cartCount').textContent = cart.length;
        }

        function openCart() {
            const cartItems = document.getElementById('cartItems');
            if (cart.length === 0) {
                cartItems.innerHTML = '<p style="text-align: center; color: #999; padding: 40px;">Your cart is empty</p>';
            } else {
                cartItems.innerHTML = cart.map((item, index) => `
                    <div class="cart-item">
                        <img src="${item.image}" alt="${item.name}" class="cart-item-image">
                        <div class="cart-item-info">
                            <h3>${item.name}</h3>
                            <p style="color: #667eea; font-weight: bold;">₹${item.newPrice}</p>
                        </div>
                        <button class="remove-btn" onclick="removeFromCart(${index})">Remove</button>
                    </div>
                `).join('');
            }
            openModal('cartModal');
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCartCount();
            openCart();
        }

        function proceedToPayment() {
            if (cart.length === 0) {
                alert('Your cart is empty!');
                return;
            }
            closeModal('cartModal');
            openModal('paymentModal');
        }

        function selectPayment(method) {
            selectedPayment = method;
            document.querySelectorAll('.payment-option').forEach(option => {
                option.classList.remove('selected');
            });
            event.target.classList.add('selected');
        }

        function proceedToAddress() {
            if (!selectedPayment) {
                alert('Please select a payment method!');
                return;
            }
            closeModal('paymentModal');
            openModal('addressModal');
        }

        document.getElementById('addressForm').addEventListener('submit', function(e) {
            e.preventDefault();
            closeModal('addressModal');
            
            // Calculate delivery date (5-7 days from now)
            const deliveryDate = new Date();
            deliveryDate.setDate(deliveryDate.getDate() + Math.floor(Math.random() * 3) + 5);
            const formattedDate = deliveryDate.toLocaleDateString('en-IN', { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            });
            
            document.getElementById('deliveryInfo').innerHTML = `
                <p><strong>Expected Delivery:</strong> ${formattedDate}</p>
                <p style="margin-top: 10px;">Order ID: ORD${Math.floor(Math.random() * 1000000)}</p>
            `;
            
            openModal('successModal');
            
            // Clear cart
            cart = [];
            updateCartCount();
        });

        function openModal(id) {
            document.getElementById(id).classList.add('active');
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        function closeAllModals() {
            document.querySelectorAll('.modal').forEach(modal => {
                modal.classList.remove('active');
            });
        }

        // Initialize
        initProducts();
    </script>
</body>
</html>
