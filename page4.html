<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plant Products Grid</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

body{
  font-family:'Poppins',sans-serif;
  margin:0;
  padding:0;
  background:#f8f8f8;
}
header{
  text-align:center;
  padding:20px;
  background:#4caf50;
  color:white;
  font-size:24px;
  font-weight:700;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:30px;
  max-width:1400px;
  margin:0 auto;
}
.card{
  background:white;
  border-radius:12px;
  box-shadow:0 4px 15px rgba(0,0,0,0.1);
  overflow:hidden;
  transition:transform 0.3s,box-shadow 0.3s;
  position:relative;
}
.card:hover{
  transform:translateY(-5px);
  box-shadow:0 10px 25px rgba(0,0,0,0.15);
}
.ribbon{
  position:absolute;
  top:10px; left:10px;
  background:#ffcc00;
  color:#000;
  font-size:12px;
  font-weight:600;
  padding:3px 8px;
  border-radius:5px;
  display:flex;
  align-items:center;
  gap:3px;
}
.card img{
  width:100%;
  display:block;
}
.card-content{
  padding:15px;
  text-align:center;
}
.card-content h3{
  font-size:16px;
  margin:10px 0 5px;
  font-weight:600;
  color:#333;
}
.price{
  margin:5px 0;
  font-size:16px;
  font-weight:600;
  color:#388e3c;
}
.old-price{
  text-decoration:line-through;
  color:#999;
  margin-left:8px;
  font-weight:400;
}
.rating{
  font-size:12px;
  margin-bottom:5px;
  color:#555;
}
.btn{
  display:inline-block;
  margin-top:10px;
  background:#2e7d32;
  color:white;
  padding:10px 15px;
  border:none;
  border-radius:25px;
  font-weight:600;
  cursor:pointer;
  text-decoration:none;
  transition:background 0.3s;
}
.btn:hover{
  background:#1b5e20;
}

/* Responsive */
@media(max-width:768px){
  .grid{
    padding:15px;
    gap:15px;
  }
}
@media(max-width:480px){
  .grid{
    grid-template-columns:1fr;
  }
}
</style>
</head>
<body>
<header>Plant Products</header>
<div class="grid">

<!-- Example product card, repeat 32 times and update img, name, price, old price, rating, review -->
<div class="card">
  <div class="ribbon">🔥 Bestseller</div>
  <img src="IMG/p59.webp" alt="Product 1">
  <div class="card-content">
    <div class="rating">⭐ 4.69 | 48</div>
    <h3>Mealybug Magic Spray for Plant</h3>
    <div class="price">₹349 <span class="old-price">₹999</span></div>
    <a href="#" class="btn">VIEW PRODUCT</a>
  </div>
</div>

<div class="card">
  <div class="ribbon">🔥 Bestseller</div>
  <img src="IMG/p60.webp" alt="Product 2">
  <div class="card-content">
    <div class="rating">⭐ 4.79 | 100</div>
    <h3>Cocopeat Block</h3>
    <div class="price">₹199 <span class="old-price">₹249</span></div>
    <a href="#" class="btn">VIEW PRODUCT</a>
  </div>
</div>

<div class="card">
  <div class="ribbon">🔥 Bestseller</div>
  <img src="IMG/p61.webp" alt="Product 3">
  <div class="card-content">
    <div class="rating">⭐ 4.87 | 108</div>
    <h3>Vermicompost</h3>
    <div class="price">₹199 <span class="old-price">₹299</span></div>
    <a href="#" class="btn">VIEW PRODUCT</a>
  </div>
</div>

<div class="card">
  <div class="ribbon">🔥 Bestseller</div>
  <img src="IMG/p62.webp" alt="Product 4">
  <div class="card-content">
    <div class="rating">⭐ 4.84 | 139</div>
    <h3>Garden Soil Mix</h3>
    <div class="price">₹369 <span class="old-price">₹499</span></div>
    <a href="#" class="btn">VIEW PRODUCT</a>
  </div>
</div>

<!-- Repeat similar blocks for remaining 28 products with IMG/p63.webp to IMG/p90.webp -->
</div>
</body>
</html>
