<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Product Cart</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 20px;
            min-height: 100vh;
        }

        .product-container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            min-height: 600px;
        }

        .product-image-section {
            flex: 1;
            background: linear-gradient(45deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .product-image {
            width: 300px;
            height: 300px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            transition: transform 0.3s ease;
        }

        .product-image:hover {
            transform: scale(1.05);
        }

        .product-image img {
            width: 80%;
            height: 80%;
            object-fit: contain;
        }

        .floating-elements {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .floating-circle {
            position: absolute;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
        }

        .circle-1 { width: 60px; height: 60px; top: 10%; left: 10%; animation-delay: 0s; }
        .circle-2 { width: 80px; height: 80px; top: 70%; right: 15%; animation-delay: 2s; }
        .circle-3 { width: 40px; height: 40px; bottom: 20%; left: 20%; animation-delay: 4s; }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        .product-details {
            flex: 1;
            padding: 60px 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .product-title {
            font-size: 2.5em;
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .product-subtitle {
            color: #718096;
            font-size: 1.1em;
            margin-bottom: 30px;
        }

        .price-section {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .current-price {
            font-size: 2.2em;
            font-weight: 800;
            color: #1a202c;
        }

        .original-price {
            font-size: 1.3em;
            color: #a0aec0;
            text-decoration: line-through;
        }

        .discount-badge {
            background: linear-gradient(135deg, #ff6b6b, #ee5a52);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 600;
        }

        .rating-section {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 40px;
        }

        .stars {
            display: flex;
            gap: 2px;
        }

        .star {
            color: #ffd700;
            font-size: 1.2em;
        }

        .rating-text {
            color: #718096;
            font-size: 0.9em;
        }

        .options-section {
            margin-bottom: 40px;
        }

        .option-group {
            margin-bottom: 25px;
        }

        .option-label {
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 12px;
            font-size: 1.1em;
        }

        .size-options, .color-options {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .size-option {
            padding: 12px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            background: #f7fafc;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .size-option:hover {
            border-color: #667eea;
            transform: translateY(-2px);
        }

        .size-option.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }

        .color-option {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: all 0.3s ease;
            position: relative;
        }

        .color-option:hover {
            transform: scale(1.1);
        }

        .color-option.active {
            border-color: #2d3748;
            box-shadow: 0 0 0 3px rgba(45, 55, 72, 0.2);
        }

        .color-red { background: #ff6b6b; }
        .color-blue { background: #4dabf7; }
        .color-green { background: #51cf66; }
        .color-purple { background: #9775fa; }
        .color-orange { background: #ffa726; }

        .quantity-section {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .quantity-label {
            font-weight: 600;
            color: #2d3748;
            font-size: 1.1em;
        }

        .quantity-controls {
            display: flex;
            align-items: center;
            background: #f7fafc;
            border-radius: 12px;
            border: 2px solid #e2e8f0;
        }

        .quantity-btn {
            width: 45px;
            height: 45px;
            border: none;
            background: transparent;
            font-size: 1.5em;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            font-weight: 600;
            color: #667eea;
        }

        .quantity-btn:hover {
            background: rgba(102, 126, 234, 0.1);
        }

        .quantity-input {
            width: 60px;
            height: 45px;
            border: none;
            text-align: center;
            font-size: 1.1em;
            font-weight: 600;
            background: transparent;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
        }

        .btn {
            flex: 1;
            padding: 18px 24px;
            border: none;
            border-radius: 16px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.2);
            transition: left 0.5s ease;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn-cart {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-cart:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.4);
        }

        .btn-buy {
            background: linear-gradient(135deg, #51cf66 0%, #40c057 100%);
            color: white;
        }

        .btn-buy:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(81, 207, 102, 0.4);
        }

        .wishlist-btn {
            position: absolute;
            top: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            border: none;
            background: rgba(255,255,255,0.9);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            color: #e2e8f0;
        }

        .wishlist-btn:hover {
            background: white;
            transform: scale(1.1);
            color: #ff6b6b;
        }

        .wishlist-btn.active {
            color: #ff6b6b;
            background: white;
        }

        @media (max-width: 768px) {
            .product-container {
                flex-direction: column;
                margin: 10px;
            }
            
            .product-details {
                padding: 30px 25px;
            }
            
            .product-title {
                font-size: 2em;
            }
            
            .action-buttons {
                flex-direction: column;
            }
        }

        .feature-highlight {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), rgba(118, 75, 162, 0.1));
            padding: 20px;
            border-radius: 16px;
            margin: 20px 0;
            border-left: 4px solid #667eea;
        }

        .feature-highlight h4 {
            color: #2d3748;
            margin-bottom: 8px;
            font-size: 1.1em;
        }

        .feature-highlight p {
            color: #718096;
            font-size: 0.9em;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="product-container">
        <div class="product-image-section">
            <div class="floating-elements">
                <div class="floating-circle circle-1"></div>
                <div class="floating-circle circle-2"></div>
                <div class="floating-circle circle-3"></div>
            </div>
            <div class="product-image">
                <div style="font-size: 4em; color: rgba(255,255,255,0.8);">🌱</div>
            </div>
            <button class="wishlist-btn" id="wishlistBtn">
                ♡
            </button>
        </div>

        <div class="product-details">
            <h1 class="product-title">Premium Plant</h1>
            <p class="product-subtitle">Indoor Air Purifying Collection</p>

            <div class="price-section">
                <span class="current-price">₹360</span>
                <span class="original-price">₹420</span>
                <span class="discount-badge">14% OFF</span>
            </div>

            <div class="rating-section">
                <div class="stars">
                    <span class="star">★</span>
                    <span class="star">★</span>
                    <span class="star">★</span>
                    <span class="star">★</span>
                    <span class="star">☆</span>
                </div>
                <span class="rating-text">4.2 (127 Reviews)</span>
            </div>

            <div class="feature-highlight">
                <h4>🌿 Premium Quality</h4>
                <p>Hand-picked plants with 30-day guarantee. Perfect for beginners and plant enthusiasts alike.</p>
            </div>

            <div class="options-section">
                <div class="option-group">
                    <div class="option-label">Size</div>
                    <div class="size-options">
                        <div class="size-option active" data-size="small">Small</div>
                        <div class="size-option" data-size="medium">Medium</div>
                        <div class="size-option" data-size="large">Large</div>
                        <div class="size-option" data-size="xl">Extra Large</div>
                    </div>
                </div>

                <div class="option-group">
                    <div class="option-label">Pot Color</div>
                    <div class="color-options">
                        <div class="color-option color-red active" data-color="red"></div>
                        <div class="color-option color-blue" data-color="blue"></div>
                        <div class="color-option color-green" data-color="green"></div>
                        <div class="color-option color-purple" data-color="purple"></div>
                        <div class="color-option color-orange" data-color="orange"></div>
                    </div>
                </div>
            </div>

            <div class="quantity-section">
                <span class="quantity-label">Quantity</span>
                <div class="quantity-controls">
                    <button class="quantity-btn" onclick="decreaseQuantity()">−</button>
                    <input type="number" class="quantity-input" value="1" min="1" max="10" id="quantityInput">
                    <button class="quantity-btn" onclick="increaseQuantity()">+</button>
                </div>
            </div>

            <div class="action-buttons">
                <button class="btn btn-cart" onclick="addToCart()">
                    🛒 Add to Cart
                </button>
                <button class="btn btn-buy" onclick="buyNow()">
                    ⚡ Buy Now
                </button>
            </div>
        </div>
    </div>

    <script>
        // Quantity controls
        function increaseQuantity() {
            const input = document.getElementById('quantityInput');
            const currentValue = parseInt(input.value);
            if (currentValue < 10) {
                input.value = currentValue + 1;
                updatePrice();
            }
        }

        function decreaseQuantity() {
            const input = document.getElementById('quantityInput');
            const currentValue = parseInt(input.value);
            if (currentValue > 1) {
                input.value = currentValue - 1;
                updatePrice();
            }
        }

        function updatePrice() {
            const quantity = parseInt(document.getElementById('quantityInput').value);
            const basePrice = 360;
            const newPrice = basePrice * quantity;
            document.querySelector('.current-price').textContent = `₹${newPrice}`;
        }

        // Size selection
        document.querySelectorAll('.size-option').forEach(option => {
            option.addEventListener('click', function() {
                document.querySelectorAll('.size-option').forEach(opt => opt.classList.remove('active'));
                this.classList.add('active');
            });
        });

        // Color selection
        document.querySelectorAll('.color-option').forEach(option => {
            option.addEventListener('click', function() {
                document.querySelectorAll('.color-option').forEach(opt => opt.classList.remove('active'));
                this.classList.add('active');
            });
        });

        // Wishlist toggle
        document.getElementById('wishlistBtn').addEventListener('click', function() {
            this.classList.toggle('active');
            this.textContent = this.classList.contains('active') ? '♥' : '♡';
        });

        // Cart and buy functions
        function addToCart() {
            const btn = document.querySelector('.btn-cart');
            const originalText = btn.innerHTML;
            btn.innerHTML = '✓ Added to Cart!';
            btn.style.background = 'linear-gradient(135deg, #51cf66 0%, #40c057 100%)';
            
            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.style.background = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
            }, 2000);
        }

        function buyNow() {
            const btn = document.querySelector('.btn-buy');
            const originalText = btn.innerHTML;
            btn.innerHTML = '🚀 Processing...';
            
            setTimeout(() => {
                btn.innerHTML = originalText;
                alert('Redirecting to checkout...');
            }, 1500);
        }

        // Quantity input validation
        document.getElementById('quantityInput').addEventListener('input', function() {
            const value = parseInt(this.value);
            if (value < 1) this.value = 1;
            if (value > 10) this.value = 10;
            updatePrice();
        });
    </script>
</body>
</html>
