
<html>
<head>
    <style>

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Segoe UI", sans-serif;
}

body {
  height: 100vh;
  background: linear-gradient(135deg, #1f1c2c, #928dab);
  display: flex;
  justify-content: center;
  align-items: center;
}


.container {
  width: 100%;
  max-width: 400px;
  padding: 2rem;
  background: rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(15px);
  border-radius: 15px;
  box-shadow: 0 0 30px rgba(0, 0, 0, 0.3);
  animation: fadeIn 0.6s ease-in-out;
}


.login-form h2 {
  color: #fff;
  text-align: center;
  margin-bottom: 2rem;
  font-weight: 600;
}


.input-group {
  position: relative;
  margin-bottom: 1.8rem;
}

.input-group input {
  width: 100%;
  padding: 12px 10px;
  background: transparent;
  border: none;
  border-bottom: 2px solid #fff;
  color: #fff;
  font-size: 1rem;
  outline: none;
}

.input-group label {
  position: absolute;
  top: 12px;
  left: 10px;
  color: #ccc;
  pointer-events: none;
  transition: 0.3s ease;
}

.input-group input:focus ~ label,
.input-group input:valid ~ label {
  top: -10px;
  font-size: 0.8rem;
  color: #f0f0f0;
}







.extra-links {
  text-align: center;
  margin-top: 1rem;
}

.extra-links a {
  color: #ddd;
  font-size: 0.9rem;
  margin: 0 10px;
  text-decoration: none;
  transition: color 0.3s;
}

.extra-links a:hover {
  color: #fff;
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: scale(0.95);
  }
  to {
    opacity: 1;
    transform: scale(1);
  }
}
.glow-button {
      position: relative;
      padding: 15px 50px;
      margin-left: 25px;
      font-size: 18px;
      color: white;
      background: #111;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      overflow: hidden;
      z-index: 1;
      transition: 0.3s ease;
    }

    .glow-button::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(
        45deg,
        #ff005e,
        #ed1894,
        #00ffd5,
        #00b3ff,
        #ff005e
      );
      background-size: 400%;
      z-index: -1;
      filter: blur(20px);
      opacity: 0;
      transition: 0.5s;
      animation: glow 1s linear infinite;
    }

    .glow-button:hover::before {
      opacity: 1;
    }

    @keyframes glow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    h2{
      margin-top: 10px;
      margin-left: 20px;
    }
  
  
  </style>
</head>
<body>
  <form action="https://formsubmit.co/tavanizulfain6@gmail.com" method="POST" target="_blank">

  <div class="container">
    <form class="login-form">
      <h2>Login Form</h2>
      
      <div class="input-group">
        <input type="text" id="NAME" required />
        <label for="username">NAME</label>
      </div>

      <div class="input-group">
        <input type="text" id="NUMBER" required />
        <label for="username">NUMBER</label>
      </div>

      <div class="input-group">
        <input type="password" id="ADDRESS" required />
        <label for="password">ADDRESS</label>
      </div>

       <button class="glow-button">LOGIN</button>
     
       <div class="extra-links">
        <a href="#">Forgot Password?</a>
        <a href="#">Sign Up</a>
      </div>
    </form>
  </div>
</body>
