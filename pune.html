<html>
  <head>
    <style>

      /* ===== Koregaon Park Store styles (unique: kp-*) ===== */
.kp-section{
  max-width:1200px; margin:40px auto; padding:24px 16px; background:#fff;
}
.kp-title{
  text-align:center; font-size:clamp(22px,3.2vw,34px);
  font-weight:800; margin-bottom:18px; color:#1b1b1b;
}
.kp-gallery{
  display:grid; gap:14px;
  grid-template-columns:repeat(4,1fr);
}
.kp-imgwrap{
  aspect-ratio: 4/3; overflow:hidden; border-radius:16px;
  background:#f3f3f3; margin:0; box-shadow:0 6px 18px rgba(0,0,0,.08);
}
.kp-imgwrap img{
  width:100%; height:100%; object-fit:cover; transition:transform .35s ease;
  display:block;
}
.kp-imgwrap:hover img{ transform:scale(1.04); }

.kp-meta{
  margin-top:16px; text-align:center; color:#2b2b2b;
}
.kp-line{ margin:6px 0; font-size:clamp(14px,1.8vw,16px); }
.kp-label{ font-weight:700; }
.kp-link{ color:#1d6ae5; text-decoration:none; }
.kp-link:hover{ text-decoration:underline; }
.kp-sep{ margin:0 8px; opacity:.5; }

.kp-cta{
  margin-top:18px; display:flex; justify-content:center;
}
.kp-btn{
  display:inline-block; padding:14px 26px; border-radius:999px;
  background:#2fb37a; color:#fff; font-weight:800; letter-spacing:.3px;
  text-decoration:none; box-shadow:0 8px 20px rgba(47,179,122,.3);
  transition:transform .12s ease, box-shadow .12s ease, opacity .12s ease;
}
.kp-btn:hover{ transform:translateY(-1px); box-shadow:0 10px 24px rgba(47,179,122,.35); }
.kp-btn:active{ transform:translateY(0); opacity:.9; }

/* Responsive */
@media (max-width:1024px){
  .kp-gallery{ grid-template-columns:repeat(3,1fr); }
}
@media (max-width:720px){
  .kp-gallery{ grid-template-columns:repeat(2,1fr); }
}
@media (max-width:460px){
  .kp-gallery{ grid-template-columns:1fr; }
  .kp-btn{ width:100%; text-align:center; }
}
/* ===== /Koregaon Park Store styles ===== */

</style>
</head>
<body>


<!-- ===== Koregaon Park Store Section (unique: kp-*) ===== -->


<section class="kp-section" id="koregaon-park">
  <h2 class="kp-title">Koregaon Park</h2>

  <div class="kp-gallery">
    <figure class="kp-imgwrap">
      <img src="IMG/p38.avif" alt="Store exterior - Ugaoo Koregaon Park">
    </figure>
    <figure class="kp-imgwrap">
      <img src="IMG/p39.avif" alt="Entrance - Ugaoo Koregaon Park">
    </figure>
    <figure class="kp-imgwrap">
      <img src="IMG/p40.avif" alt="Interior shelves - Ugaoo Koregaon Park">
    </figure>
    <figure class="kp-imgwrap">
      <img src="IMG/p41.avif" alt="Plant aisles - Ugaoo Koregaon Park">
    </figure>
  </div>

  <div class="kp-meta">
    <p class="kp-line"><span class="kp-label">Address:</span> 1, Koregaon Rd, Liberty Phase 2, Ragvilas Society, Koregaon Park, Pune, Maharashtra 411001</p>
    <p class="kp-line"><span class="kp-label">Contact:</span> <a class="kp-link" href="tel:‪+918625911190‬">‪+91 86259 11190‬</a>
      <span class="kp-sep">|</span>
      <span class="kp-label">Time:</span> 10:30AM – 9:30PM
    </p>
  </div>

  <div class="kp-cta">
    <a class="kp-btn" target="_blank" rel="noopener"
       href="https://www.google.com/maps/search/?api=1&query=1,+Koregaon+Rd,+Liberty+Phase+2,+Ragvilas+Society,+Koregaon+Park,+Pune,+Maharashtra+411001">
      Get Directions
    </a>
  </div>
</section>
