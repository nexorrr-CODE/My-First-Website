<html>
    <head>
        <style>

        
            /* ===== Bandra Store styles (unique: bs-*) ===== */
.bs-section{
  max-width:1200px; margin:40px auto; padding:24px 16px; background:#fff;
}
.bs-title{
  text-align:center; font-size:clamp(22px,3.2vw,34px);
  font-weight:800; margin-bottom:18px; color:#1b1b1b;
}
.bs-gallery{
  display:grid; gap:14px;
  grid-template-columns:repeat(4,1fr);
}
.bs-imgwrap{
  aspect-ratio:4/3; overflow:hidden; border-radius:16px;
  background:#f3f3f3; margin:0; box-shadow:0 6px 18px rgba(0,0,0,.08);
}
.bs-imgwrap img{
  width:100%; height:100%; object-fit:cover; transition:transform .35s ease;
  display:block;
}
.bs-imgwrap:hover img{ transform:scale(1.04); }

.bs-meta{
  margin-top:16px; text-align:center; color:#2b2b2b;
}
.bs-line{ margin:6px 0; font-size:clamp(14px,1.8vw,16px); }
.bs-label{ font-weight:700; }
.bs-link{ color:#1d6ae5; text-decoration:none; }
.bs-link:hover{ text-decoration:underline; }
.bs-sep{ margin:0 8px; opacity:.5; }

.bs-cta{
  margin-top:18px; display:flex; justify-content:center;
}
.bs-btn{
  display:inline-block; padding:14px 26px; border-radius:999px;
  background:#2fb37a; color:#fff; font-weight:800; letter-spacing:.3px;
  text-decoration:none; box-shadow:0 8px 20px rgba(47,179,122,.3);
  transition:transform .12s ease, box-shadow .12s ease, opacity .12s ease;
}
.bs-btn:hover{ transform:translateY(-1px); box-shadow:0 10px 24px rgba(47,179,122,.35); }
.bs-btn:active{ transform:translateY(0); opacity:.9; }

/* Responsive */
@media (max-width:1024px){
  .bs-gallery{ grid-template-columns:repeat(3,1fr); }
}
@media (max-width:720px){
  .bs-gallery{ grid-template-columns:repeat(2,1fr); }
}
@media (max-width:460px){
  .bs-gallery{ grid-template-columns:1fr; }
  .bs-btn{ width:100%; text-align:center; }
}
/* ===== /Bandra Store styles ===== */

</style>
</head>

<body>

<!-- ===== Bandra Store Section (unique: bs-*) ===== -->
<section class="bs-section" id="bandra-store">
  <h2 class="bs-title">Bandra Store</h2>

  <div class="bs-gallery">
    <figure class="bs-imgwrap">
      <img src="IMG/p42.avif" alt="Bandra Store Exterior">
    </figure>
    <figure class="bs-imgwrap">
      <img src="IMG/p43.avif" alt="Bandra Store Entrance">
    </figure>
    <figure class="bs-imgwrap">
      <img src="IMG/p44.webp" alt="Bandra Store Interior Shelves">
    </figure>
    <figure class="bs-imgwrap">
      <img src="IMG/p45.webp" alt="Bandra Store Plants Section">
    </figure>
  </div>

  <div class="bs-meta">
    <p class="bs-line">
      <span class="bs-label">Address:</span>
      Shop 1, 264, Blue Heaven, Linking Rd, next to Bademiya, Bandra West, Mumbai, Maharashtra 400050
    </p>
    <p class="bs-line">
      <span class="bs-label">Contact:</span> 
      <a class="bs-link" href="tel:‪+918180001460‬">‪+91 81800 01460‬</a>
      <span class="bs-sep">|</span>
      <span class="bs-label">Hours:</span> 10:30 AM – 9:30 PM
    </p>
  </div>

  <div class="bs-cta">
    <a class="bs-btn" target="_blank" rel="noopener"
       href="https://www.google.com/maps/search/?api=1&query=Shop+1,+264,+Blue+Heaven,+Linking+Rd,+next+to+Bademiya,+Bandra+West,+Mumbai,+Maharashtra+400050">

    </a>
  </div>
</section>
<!-- ===== /Bandra Store Section ===== -->
